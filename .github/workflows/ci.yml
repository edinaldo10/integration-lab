name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          # Instala dependências de todos os serviços
          pip install flake8
          pip install -r service-a/requirements.txt
          pip install -r service-b/requirements.txt
          pip install -r service-c/requirements.txt

      - name: Lint with flake8
        run: |
          # Verifica erros de sintaxe (E9, F63, F7, F82) em todos os serviços
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

 build-docker:
    needs: test-and-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Adicione este passo para configurar o Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check Docker Compose configuration
        run: docker compose config
