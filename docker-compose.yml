services:
  # --- SEUS SERVIÇOS ---
  service-a:
    build: ./service-a
    ports:
      - "8000:8000"
    environment:
      - SERVICE_B_URL=http://service-b:8000
    depends_on:
      - service-b

  service-b:
    build: ./service-b
    environment:
      - SERVICE_C_URL=http://service-c:8000
      - FAIL_MODE=false
    depends_on:
      - service-c

  service-c:
    build: ./service-c

  # --- MONITORAMENTO E LOGS ---
  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  loki:
    image: grafana/loki
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki

# Usamos a rede padrão do Docker Compose para que o DNS funcione automaticamente
# para todos os serviços sem necessidade de declaração manual.
networks:
  default:
    driver: bridge
